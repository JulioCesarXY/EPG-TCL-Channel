name: Atualizar Playlist e EPG TCL TV Plus

on:
  schedule:
    # Executa automaticamente todos os dias às 00:00 UTC (21:00 BRT)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Permite rodar manualmente clicando no botão no GitHub

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Permissão para o bot atualizar os arquivos e o README

    steps:
    - name: Baixar código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Python ambiente
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependências de rede
      run: |
        python -m pip install --upgrade pip
        pip install requests urllib3

    - name: Executar o Raspador TCL
      run: python tcl_scraper.py

    
    - name: Injetar Data e Hora no Badge do README
      run: |
        python -c "
        import re
        from datetime import datetime
        import zoneinfo

        # Define o fuso horário de Brasília
        tz = zoneinfo.ZoneInfo('America/Sao_Paulo')
        now = datetime.now(tz)
        
        # Formata a data de um jeito aceito pelo Shields.io (Ex: 25--05--2026_09h21)
        # O Shields usa hifens duplos '--' para escapar hifens comuns na mensagem
        timestamp = now.strftime('%d--%m--%Y_%Hh%M')

        # Lê o README original
        with open('README.md', 'r', encoding='utf-8') as f:
            content = f.read()

        # Substitui qualquer variação antiga do badge ou o marcador pelo novo link estável
        # Usamos uma expressão regular para capturar a tag <img> do badge de atualização
        pattern = r'<img src=\"https://img\.shields\.io/badge/Atualizado-[^\"]+\" alt=\"Last Update\">'
        new_badge = f'<img src=\"https://img.shields.io/badge/Atualizado-{timestamp}-blue?style=for-the-badge\&label=Ultima%20Atualizacao\" alt=\"Last Update\">'
        
        # Se não achar o padrão (primeira execução), tenta substituir o marcador direto
        if 'HORARIO_COMPILACAO' in content:
            content = content.replace('HORARIO_COMPILACAO', timestamp)
        else:
            content = re.sub(pattern, new_badge, content)

        # Salva o arquivo atualizado
        with open('README.md', 'w', encoding='utf-8') as f:
            f.write(content)
        "

    - name: Salvar e Commitar alterações no repositório
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add tcl.m3u8 tcl_epg.xml README.md
        
        if git diff --staged --quiet; then
          echo "Nenhuma alteração detectada nos dados."
        else
          git commit -m "Atualização automática: Dados e EPG gerados"
          git push
        fi
